<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
@media(max-width:600px){

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background:linear-gradient(135deg,#4F46E5,#7C3AED,#2563EB);
        padding:20px;
    }

    #container{
        width:100%;
        max-width:500px;
        padding:50px 30px;
        text-align:center;

        background:rgba(255,255,255,0.12);
        backdrop-filter:blur(15px);
        -webkit-backdrop-filter:blur(15px);

        border-radius:25px;
        border:1px solid rgba(255,255,255,0.2);

        box-shadow:0 20px 50px rgba(0,0,0,0.25);
    }

    #head{
        color:white;
        font-size:35px;
        margin-bottom:20px;
        line-height:1.4;
    }

    #para{
        color:white;
        font-size:20px;
        margin-bottom:40px;
    }

    #btn1{
        width:220px;
        height:60px;
        border:none;
        border-radius:15px;
        cursor:pointer;

        background:rgba(255,255,255,0.9);
        box-shadow:0 5px 15px rgba(0,0,0,0.1);

        transition:all .3s ease;
    }

    #btn1:hover{
        background:#2563EB;
        transform:translateY(-4px);
        box-shadow:0 10px 25px rgba(37,99,235,.4);
    }

    #btn1:hover a{
        color:white;
    }

    a{
        display:block;
        width:100%;
        height:100%;
        text-decoration:none;
        line-height:60px;
        font-size:20px;
        font-weight:600;
        color:#333;
        transition:.3s;
    }

}
</style>
<body>
    <div id="container">
        <h1 id="head">Welcome to RCCG fun game.</h1>
        <p id="para">Click on enter to continue</p>
        <button onclick="startGame()" id="btn1"><a href="gam.html"> Enter</a></button>
    </div>
</body>
</html>
